<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3584e4"/>
      <stop offset="1" stop-color="#1a5fb4"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6f5f4"/>
      <stop offset="1" stop-color="#deddda"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>
  <!-- Screen/monitor shape -->
  <rect x="24" y="28" width="80" height="56" rx="6" fill="url(#screen)" opacity="0.95"/>
  <!-- Selection rectangle (dashed red border) -->
  <rect x="36" y="38" width="44" height="32" rx="2" fill="none" stroke="#e74c3c" stroke-width="3" stroke-dasharray="6,3"/>
  <!-- Crosshair lines inside selection -->
  <line x1="58" y1="38" x2="58" y2="70" stroke="#e74c3c" stroke-width="1.5" opacity="0.5"/>
  <line x1="36" y1="54" x2="80" y2="54" stroke="#e74c3c" stroke-width="1.5" opacity="0.5"/>
  <!-- Record dot -->
  <circle cx="96" y="42" r="8" fill="#e74c3c" cy="42"/>
  <circle cx="96" cy="42" r="4.5" fill="#f66151"/>
  <!-- Monitor stand -->
  <rect x="50" y="84" width="28" height="4" rx="2" fill="#f6f5f4" opacity="0.7"/>
  <rect x="54" y="88" width="20" height="3" rx="1.5" fill="#f6f5f4" opacity="0.5"/>
  <!-- "GIF" text below -->
  <text x="64" y="110" font-family="sans-serif" font-weight="bold" font-size="16" fill="white" text-anchor="middle" opacity="0.9">GIF</text>
</svg>
